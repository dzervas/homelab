version: '3'

services:
  kibana:
    depends_on:
      - elasticsearch
    image: docker.elastic.co/kibana/kibana:7.6.2
    restart: unless-stopped
    networks:
      - default
      - proxy
    labels:
      traefik.enable: true
      traefik.http.routers.logs.rule: "Host(`logs.${HOMELAB_DOMAIN}`)"
      traefik.http.routers.logs.entrypoints: websecure
      traefik.http.routers.logs.middlewares: authelia@docker

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.6.2
    restart: unless-stopped
    volumes:
      # chown 1000:1000 /data/logs/elasticsearch/
      - /data/logs/elasticsearch:/usr/share/elasticsearch/data
    environment:
      discovery.type: single-node
      ES_JAVA_OPTS: "-Xms1024m -Xmx4096m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 1m30s
      timeout: 10s
      retries: 3

  vector:
    image: timberio/vector:nightly-alpine
    restart: unless-stopped
    networks:
      - default
      - proxy
    volumes:
      - /data/logs/vector.toml:/etc/vector/vector.toml:ro
    expose:
      - 80
    labels:
      traefik.enable: true
      traefik.http.routers.vector.rule: "Host(`vector.${HOMELAB_DOMAIN}`)"
      traefik.http.routers.vector.entrypoints: websecure

networks:
  proxy:
    external:
      name: proxy
