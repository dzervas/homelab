version: '3'

services:
  kibana:
    depends_on:
      - elasticsearch
    image: docker.elastic.co/kibana/kibana:7.6.2
    restart: unless-stopped
    networks:
      - default
      - proxy
    labels:
      traefik.enable: true
      traefik.http.routers.logs.rule: "Host(`logs.${HOMELAB_DOMAIN}`)"
      traefik.http.routers.logs.entrypoints: websecure
      traefik.http.routers.logs.middlewares: authelia@docker

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.6.2
    restart: unless-stopped
    volumes:
      # chown 1000:1000 /data/logs/elasticsearch/
      - /data/logs/elasticsearch:/usr/share/elasticsearch/data
    environment:
      discovery.type: single-node
      ES_JAVA_OPTS: "-Xms512m -Xmx1024m"
    ulimits:
      memlock:
        soft: -1
        hard: -1

  vector:
    image: timberio/vector:latest-alpine
    restart: unless-stopped
    networks:
      - default
      - proxy
    volumes:
      - /data/logs/vector.toml:/etc/vector/vector.toml:ro
    labels:
      traefik.enable: true
      traefik.tcp.routers.vector.rule: "HostSNI(`vector.${HOMELAB_DOMAIN}`)"
      traefik.tcp.routers.vector.tls: true
      traefik.tcp.routers.vector.certresolver: lan
      traefik.tcp.routers.vector.entrypoints: vector
      traefik.tcp.services.vector.loadbalancer.server.port: 9000

networks:
  proxy:
    external:
      name: proxy
