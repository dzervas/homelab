version: '3'

services:
  hass:
    image: homeassistant/home-assistant:stable
    restart: unless-stopped
    networks:
      - default
      - proxy
    volumes:
      - /data/hass/hass:/config
    ports:
      # HomeKit
      - 51827:51827
    expose:
      - 8123
    environment:
      TZ: "${TZ}"
    labels:
      traefik.enable: true
      traefik.http.routers.hass.rule: "Host(`hass.${HOMELAB_DOMAIN}`)"
      traefik.http.routers.hass.entrypoints: websecure

networks:
  proxy:
    external:
      name: proxy
