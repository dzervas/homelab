---

- hosts: server
  become: yes
  vars_files: ~/.homelab/server.yml
  roles:
    - role: vector
      vars:
        add_vector_docker_group: yes
        add_vector_journal_group: yes
        sources:
          journald:
            type: journald
            current_boot_only: true
#          docker:
#            type: docker
        sinks:
          vector:
            type: vector
            address: "vector.{{ homelab_domain }}:9000"
            inputs: "{{ sources.keys() | list }}"

- hosts: router
  vars_files: ~/.homelab/server.yml
  become: yes
  roles:
    - role: vector
      vars:
        sources:
          file:
            type: file
            ignore_older: 86400
            files:
              - /var/log/messages
              - /var/log/daemon.log
        sinks:
          vector:
            type: vector
            address: "vector.{{ homelab_domain }}:9000"
            inputs: "{{ sources.keys() | list }}"

- hosts: proxy
  vars_files: ~/.homelab/server.yml
  become: yes
  roles:
    - role: vector
      vars:
        add_vector_journal_group: yes
        sources:
          journal:
            type: journald
            current_boot_only: true
        sinks:
          vector:
            type: vector
            address: "vector.{{ homelab_domain }}:9000"
            inputs: "{{ sources.keys() | list }}"
